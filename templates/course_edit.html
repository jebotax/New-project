{% extends "base.html" %}
{% block title %}Edit Course{% endblock %}
{% block content %}
<section class="form-card narrow">
  <div class="section-head">
    <div>
      <p class="eyebrow">Course update</p>
      <h1>Edit {{ course['title'] }}</h1>
    </div>
    <a href="{{ url_for('manage_courses') }}">Back to courses</a>
  </div>
  <form method="post" class="form-grid">
    <label>Code<input type="text" name="code" value="{{ course['code'] }}" required></label>
    <label>Title<input type="text" name="title" value="{{ course['title'] }}" required></label>
    <label>Description<textarea name="description" rows="5" required>{{ course['description'] }}</textarea></label>
    <label>Duration (days)<input type="number" name="duration_days" min="1" value="{{ course['duration_days'] }}" required></label>
    <label>Price (USD)<input type="number" name="price" min="0" step="0.01" value="{{ '%.2f'|format(course['price_cents'] / 100) }}" required></label>
    <label>Prerequisites<input type="text" name="prerequisites" value="{{ course['prerequisites'] or '' }}"></label>
    <label>Certificate prefix<input type="text" name="certificate_prefix" value="{{ course['certificate_prefix'] }}" required></label>
    <label>Status
      <select name="is_active">
        <option value="1" {% if course['is_active'] %}selected{% endif %}>Active</option>
        <option value="0" {% if not course['is_active'] %}selected{% endif %}>Inactive</option>
      </select>
    </label>
    <div class="button-row">
      <button type="submit">Save course</button>
    </div>
  </form>
  <form method="post" action="{{ url_for('delete_course', course_id=course['id']) }}">
    <button type="submit" class="danger">Delete course</button>
  </form>
</section>
{% endblock %}
